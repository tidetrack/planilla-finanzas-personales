<style>
/* ============================================
 * DESIGN SYSTEM CONSTANTS - TIDETRACK (GLOBAL)
 * ============================================
 */

:root {
    /* Color Palette */
    --primary-color: #34475d; /* Darkest, relevant blocks */
    --primary-dark: #2b3a4d; /* Slightly darker shade */
    --secondary-color: #6e7f8d; 
    --secondary-hover: #5d6c78; 
    --accent-color: #b5bfc6; /* Button para "botones seleccionados" */
    --accent-hover: #9eabb5; 
    
    /* Backgrounds */
    --bg-main: #eff2f9; /* Fondo de hojas / paneles */
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #e2e8f0; 

    /* Texts */
    --text-main: #34475d; 
    --text-secondary: #6e7f8d; 
    --text-accent: #6e7f8d; 
    --text-inverse: #FFFFFF;

    /* Semantic Colors */
    --success: #10B981;
    --success-bg: #D1FAE5;
    --danger: #EF4444; /* Red 500 */
    --danger-bg: #FEE2E2;
    --warning: #F59E0B; /* Amber 500 */
    --warning-bg: #FEF3C7;
    --info: #3B82F6;
    --info-bg: #DBEAFE;

    /* Visual Styles */
    --border-color: #E2E8F0; /* Slate 200 */
    --border-radius-sm: 6px;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
    --border-radius-xl: 16px;
    
    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

    /* Fonts */
    --font-family: 'Google Sans', 'Roboto', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;

    /* Transitions */
    --transition-fast: 0.15s ease-in-out;
    --transition-normal: 0.25s ease-in-out;
}

/* ============================================
 * RESET & BASE COMPONENT STYLES
 * ============================================
 */

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: var(--font-family);
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.5;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
}

/* Layout */
.container {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
}

.container-xs { max-width: 480px; }
.container-sm { max-width: 640px; }
.container-md { max-width: 768px; }

/* Utilities */
.hidden { display: none !important; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.text-muted { color: var(--text-secondary); }

/* Dividers */
hr.divider {
    border: 0;
    border-top: 1px solid var(--border-color);
    margin: 24px 0;
}

/* ============================================
 * FORMS & INPUTS
 * ============================================
 */

.form-group {
    margin-bottom: 20px;
}

.form-label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--primary-color);
    font-size: 13px;
    letter-spacing: 0.3px;
}

.form-input, .form-select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    font-size: 14px;
    color: var(--text-main);
    background-color: var(--bg-secondary);
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-sm);
}

.form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(181, 191, 198, 0.35);
}

.form-input::placeholder {
    color: #94A3B8;
}

/* ============================================
 * BUTTONS
 * ============================================
 */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 18px;
    font-weight: 500;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    border: none;
    font-size: 14px;
    transition: all var(--transition-fast);
    gap: 8px;
}

.btn:active {
    transform: translateY(1px);
}

.btn-primary {
    background-color: var(--primary-color);
    color: var(--text-inverse);
    box-shadow: var(--shadow-sm);
}

.btn-primary:hover {
    background-color: var(--primary-dark);
    box-shadow: var(--shadow-md);
}

.btn-secondary {
    background-color: var(--bg-secondary);
    color: var(--text-main);
    border: 1px solid var(--border-color);
}

.btn-secondary:hover {
    background-color: var(--bg-tertiary);
    border-color: #CBD5E1;
}

.btn-danger {
    background-color: var(--danger);
    color: var(--text-inverse);
}

.btn-danger:hover {
    background-color: #DC2626; /* Red 600 */
}

.btn-selected {
    background-color: var(--accent-color);
    color: var(--primary-color);
    border: 1px solid var(--accent-color);
    font-weight: 500;
}

.btn-selected:hover {
    background-color: var(--accent-hover);
    color: var(--primary-color);
}

.btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}

/* ============================================
 * CARDS & PANELS
 * ============================================
 */

.card {
    background-color: var(--bg-secondary);
    border-radius: var(--border-radius-lg);
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    padding: 24px;
    margin-bottom: 24px;
}

/* ============================================
 * CUSTOM SCROLLBAR
 * ============================================
 */

::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-main); 
}
 
::-webkit-scrollbar-thumb {
    background: #CBD5E1; 
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #94A3B8; 
}

</style>
